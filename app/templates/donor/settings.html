{% extends "base.html" %}

{% block title %}Settings{% endblock %}
{% block page_title %}Account Settings{% endblock %}

{% block sidebar %}{% include "shared/sidebar_donor.html" %}{% endblock %}

{% block content %}
<div style="max-width:520px;">

  <div class="form-section" style="margin-bottom:20px;">
    <div class="form-section-title">Change Username</div>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="action" value="change_username">
      <div class="form-group">
        <label for="new_username">New Username</label>
        <input type="text" id="new_username" name="new_username"
               minlength="3" maxlength="64" placeholder="Enter new username" autocomplete="off">
      </div>
      <button type="submit" class="btn btn-primary">Update Username</button>
    </form>
  </div>

  <div class="form-section">
    <div class="form-section-title">Change Password</div>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="action" value="change_password">
      <div class="form-group">
        <label for="current_password">Current Password</label>
        <input type="password" id="current_password" name="current_password" autocomplete="current-password">
      </div>
      <div class="form-group">
        <label for="new_password">New Password</label>
        <input type="password" id="new_password" name="new_password" minlength="6" autocomplete="new-password">
        <p class="form-hint">At least 6 characters.</p>
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm New Password</label>
        <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary">Update Password</button>
    </form>
  </div>

</div>
{% endblock %}
